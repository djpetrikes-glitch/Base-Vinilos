<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinylBase v2.1 — Dj Petrik</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --bg4: #2e2e2e;
    --border: #333;
    --border2: #444;
    --text: #e8e8e8;
    --text2: #999;
    --text3: #666;
    --accent: #e8531a;
    --accent-bg: rgba(232,83,26,0.12);
    --accent-border: rgba(232,83,26,0.35);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.12);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --radius: 6px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }

  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 210px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* Sidebar */
  .logo { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
  .logo-title { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .logo-title span { color: var(--accent); }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); padding: 14px 16px 5px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 16px; font-size: 13px; color: var(--text2); cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: color .15s, background .15s; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { color: var(--accent); background: var(--accent-bg); font-weight: 500; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
  .nav-item.active svg { opacity: 1; }
  .sidebar-bottom { margin-top: auto; padding: 14px 16px; border-top: 1px solid var(--border); }
  .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; }
  .stat-row span:first-child { color: var(--text2); }
  .stat-row span:last-child { color: var(--text); font-weight: 500; }
  .progress-wrap { height: 3px; background: var(--bg4); border-radius: 2px; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .5s; }
  .progress-label { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* Topbar */
  .topbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .page-title { font-size: 14px; font-weight: 600; color: var(--text); min-width: 80px; }
  .search-box { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 0 10px; height: 32px; max-width: 400px; }
  .search-box input { flex: 1; border: none; background: none; outline: none; font-size: 13px; color: var(--text); }
  .search-box input::placeholder { color: var(--text3); }
  .search-box svg { width: 14px; height: 14px; color: var(--text3); flex-shrink: 0; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); transition: all .15s; white-space: nowrap; }
  .btn:hover { background: var(--bg4); border-color: var(--border2); }
  .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-accent:hover { background: #d4461a; border-color: #d4461a; }
  .btn svg { width: 14px; height: 14px; }

  /* Filters */
  .filters { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-wrap: wrap; flex-shrink: 0; }
  .chip { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; white-space: nowrap; }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.on { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
  .filter-sep { width: 1px; height: 16px; background: var(--border); margin: 0 2px; }

  /* Table */
  .table-wrap { flex: 1; overflow-y: auto; }
  .table-wrap::-webkit-scrollbar { width: 6px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead { position: sticky; top: 0; background: var(--bg2); z-index: 2; }
  th { padding: 8px 10px; font-size: 10px; font-weight: 600; color: var(--text3); text-align: left; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .07em; cursor: pointer; user-select: none; white-space: nowrap; overflow: hidden; }
  th:hover { color: var(--text2); }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:hover td { background: var(--bg3); }
  tr.selected td { background: var(--accent-bg); }
  tr.selected:hover td { background: var(--accent-bg); }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-gray { background: var(--bg4); color: var(--text3); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-accent { background: var(--accent-bg); color: var(--accent); }

  /* Avatar */
  .avatar { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .av-you { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
  .av-paquillo { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(59,130,246,.3); }

  /* Detail panel */
  .detail { width: 280px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
  .detail-cover { width: 100%; aspect-ratio: 1; background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; overflow: hidden; }
  .detail-cover img { width: 100%; height: 100%; object-fit: cover; }
  .detail-cover-ph { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--text3); }
  .detail-cover-ph svg { width: 48px; height: 48px; }
  .detail-cover-ph span { font-size: 11px; }
  .detail-body { padding: 14px; flex: 1; }
  .d-catalog { font-size: 10px; color: var(--text3); font-family: monospace; margin-bottom: 4px; }
  .d-artist { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .d-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 14px; }
  .d-section { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin: 14px 0 8px; padding-top: 12px; border-top: 1px solid var(--border); }
  .d-field { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .d-label { font-size: 11px; color: var(--text3); }
  .d-val { font-size: 12px; color: var(--text); font-weight: 500; text-align: right; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cover-btns { display: flex; gap: 6px; margin-top: 6px; }
  .cover-btns .btn { flex: 1; justify-content: center; font-size: 11px; padding: 5px 8px; }
  .detail-actions { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .detail-actions .btn { justify-content: center; }

  /* Ripper selector */
  .ripper-sel { display: flex; gap: 6px; margin-top: 4px; }
  .ripper-opt { flex: 1; padding: 6px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg3); color: var(--text2); font-size: 11px; font-weight: 500; cursor: pointer; text-align: center; transition: all .15s; }
  .ripper-opt:hover { border-color: var(--border2); color: var(--text); }
  .ripper-opt.on-you { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
  .ripper-opt.on-paquillo { background: var(--blue-bg); color: var(--blue); border-color: rgba(59,130,246,.3); }

  /* Digital estado selector */
  .dest-sel { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .dest-opt { flex: 1; padding: 5px 4px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg3); color: var(--text2); font-size: 10px; font-weight: 500; cursor: pointer; text-align: center; transition: all .15s; min-width: 60px; }
  .dest-opt:hover { border-color: var(--border2); }
  .dest-opt.on-confirmado { background: var(--green-bg); color: var(--green); border-color: rgba(34,197,94,.3); }
  .dest-opt.on-verificar { background: var(--amber-bg); color: var(--amber); border-color: rgba(245,158,11,.3); }
  .dest-opt.on-no { background: var(--red-bg); color: var(--red); border-color: rgba(239,68,68,.3); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg2); z-index: 1; }
  .modal-head h2 { font-size: 15px; font-weight: 600; }
  .modal-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .modal-foot { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .field-g { display: flex; flex-direction: column; gap: 4px; }
  .field-g label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); }
  .field-g input, .field-g select { padding: 7px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg3); color: var(--text); width: 100%; outline: none; transition: border-color .15s; }
  .field-g input:focus, .field-g select:focus { border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Discogs results */
  .discogs-box { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; max-height: 200px; overflow-y: auto; }
  .discogs-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background .15s; }
  .discogs-item:last-child { border-bottom: none; }
  .discogs-item:hover { background: var(--bg3); }
  .discogs-thumb { width: 38px; height: 38px; border-radius: 4px; object-fit: cover; background: var(--bg4); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text3); overflow: hidden; }
  .discogs-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .discogs-info { flex: 1; min-width: 0; }
  .discogs-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .discogs-meta { font-size: 10px; color: var(--text3); margin-top: 1px; }

  /* Loading / empty */
  .state-center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 60px 20px; color: var(--text3); }
  .state-center svg { width: 40px; height: 40px; opacity: .4; }
  .state-center p { font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 9px 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; z-index: 200; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,.4); animation: fadeup .2s ease; }
  @keyframes fadeup { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

  /* Config panel */
  .config-panel { padding: 20px; max-width: 500px; }
  .config-panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .config-panel p { font-size: 12px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
  .config-section { margin-bottom: 20px; }
  .config-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 10px; }


  /* Kallax */
  .kallax-section { margin-top: 6px; }
  .kallax-unit { margin-bottom: 8px; }
  .kallax-label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 4px; }
  .kallax-grid { display: grid; gap: 3px; }
  .kallax-grid-2x4 { grid-template-columns: repeat(4, 1fr); }
  .kallax-grid-4x4 { grid-template-columns: repeat(4, 1fr); }
  .kc { aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--text3); cursor: pointer; transition: all .15s; }
  .kc:hover { border-color: var(--accent); color: var(--accent); }
  .kc.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .kc.empty { background: var(--bg); border-color: var(--border); color: var(--bg); cursor: default; pointer-events: none; }
  .kc.occupied { background: var(--bg4); border-color: var(--border2); color: var(--text2); }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-title">Vinyl<span>Base</span></div>
      <div class="logo-sub">Dj Petrik × Paquillo</div>
      <div style="font-size:10px;color:var(--text3);margin-top:3px">v2.1</div>
    </div>
    <div class="nav-section">Biblioteca</div>
    <button class="nav-item active" id="nav-vinilos" onclick="setView('vinilos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="6" stroke-dasharray="2 4"/></svg>
      Vinilos
    </button>
    <button class="nav-item" id="nav-digital" onclick="setView('digital')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Digital
    </button>
    <div class="nav-section">DJ</div>
    <button class="nav-item" id="nav-sesiones" onclick="setView('sesiones')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>
      Sesiones YouTube
    </button>
    <button class="nav-item" id="nav-config" onclick="setView('config')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Configuración
    </button>
    <div class="sidebar-bottom">
      <div class="stat-row"><span>Vinilos</span><span id="stat-vinilos">—</span></div>
      <div class="stat-row"><span>Ripeados</span><span id="stat-ripeados">—</span></div>
      <div class="stat-row"><span>Digital</span><span id="stat-digital">—</span></div>
      <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">Cargando...</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main-content">
    <div class="state-center"><div class="spinner"></div><p>Conectando con Google Sheets...</p></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"></div>

<!-- Modal añadir disco -->
<div class="modal-overlay" id="modal-add" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <h2>Añadir vinilo</h2>
      <button class="btn" onclick="closeModal()" style="padding:4px 8px">✕</button>
    </div>
    <div class="modal-body">
      <div class="row2">
        <div class="field-g"><label>Artista</label><input id="f-artist" placeholder="Larry Heard" oninput="updateNewRec('artist',this.value)"></div>
        <div class="field-g"><label>Título</label><input id="f-title" placeholder="Can You Feel It" oninput="updateNewRec('title',this.value)"></div>
      </div>
      <button class="btn" style="width:100%;justify-content:center" onclick="searchDiscogs()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span id="discogs-btn-label">Buscar en Discogs</span>
      </button>
      <div id="discogs-results" style="display:none"></div>
      <div class="row2">
        <div class="field-g"><label>Año</label><input id="f-year" placeholder="1986" oninput="updateNewRec('year',this.value)"></div>
        <div class="field-g"><label>Sello</label><input id="f-label" placeholder="Trax Records" oninput="updateNewRec('label',this.value)"></div>
      </div>
      <div class="row2">
        <div class="field-g"><label>Catálogo</label><input id="f-catalog" placeholder="TRX001" oninput="updateNewRec('catalog',this.value)"></div>
        <div class="field-g"><label>Género</label>
          <select id="f-genre" onchange="updateNewRec('genre',this.value)">
            <option>House</option><option>Techno</option><option>Hardcore</option><option>Trance</option><option>Electro</option><option>Ambient</option><option>Jazz</option><option>Soul</option><option>Funk</option><option>Disco</option><option>Electronic</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="field-g"><label>Notas</label><input id="f-notes" placeholder="Notas opcionales" oninput="updateNewRec('notes',this.value)"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="addRecord()">Añadir disco</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SHEET_ID = '1wvk9vkoF41VvzwDbiY8XleZkq7q3L0ZH';
const SHEET_NAME = 'Hoja 1';
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQruvZCIhyMdcRDgbUzfihajC9_uGRCsBtecaGUkPesaK7gRXtxWw8s2UogFWmf3g/pub?gid=540728476&single=true&output=csv';
const DISCOGS_TOKEN = 'unJlhQxWTHJZMWOBPoAuNjtIZxaVEUQnKUDWReVg';
const DISCOGS_HEADERS = { 'Authorization': `Discogs token=${DISCOGS_TOKEN}`, 'User-Agent': 'VinylBase/1.2 +djpetrik' };
const coverCache = {};

// Columnas del sheet (índice 0)
const COL = {
  catalog: 0, artist: 1, title: 2, label: 3, format: 4,
  rating: 5, year: 6, release_id: 7, folder: 8, date_added: 9,
  fuente: 10, sleeve: 11, notes: 12, num: 13, album: 14,
  length: 15, bpm: 16, genre: 17, composer: 18, remixer: 19,
  filename: 20, file_format: 21, ripeado: 22, ripeado_por: 23, digital_estado: 24,
  kallax_slot: 25
};

let allData = [];
let view = 'vinilos';
let selectedRow = null;
let filterStatus = 'all';
let filterDigital = 'all';
let filterGenre = '';
let sortCol = 'artist';
let sortDir = 1;
let searchQ = '';

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  await loadData();
  renderStats();
  renderView();
}

async function loadData() {
  try {
    const url = CSV_URL;
    const res = await fetch(url);
    if (!res.ok) throw new Error('No se pudo cargar');
    const csv = await res.text();
    allData = parseCSV(csv);
    showToast('✓ Datos cargados — ' + allData.length.toLocaleString() + ' registros');
  } catch(e) {
    allData = [];
    showToast('⚠ No se pudo conectar con Google Sheets', true);
  }
}

function parseCSV(text) {
  const lines = text.split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = parseCSVLine(line);
    rows.push(cols);
  }
  return rows;
}

function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur.trim()); cur = '';
    } else cur += c;
  }
  result.push(cur.trim());
  return result;
}

function g(row, col) { return (row[col] || '').trim(); }

// ─── FILTERING ────────────────────────────────────────────────────────────────
function isVinyl(row) {
  const fmt = g(row, COL.format).toLowerCase();
  const fuente = g(row, COL.fuente).toLowerCase();
  return fmt.includes('12"') || fmt.includes('7"') || fmt.includes('10"') || fuente === 'discogs';
}

function isDigital(row) {
  const fuente = g(row, COL.fuente).toLowerCase();
  const filename = g(row, COL.filename);
  return fuente === 'engine dj' || filename !== '';
}

function getVinyls() {
  return allData.filter(r => isVinyl(r) && !isDigital(r));
}

function getDigital() {
  return allData.filter(r => isDigital(r));
}

function filtered() {
  let data = view === 'vinilos' ? getVinyls() : getDigital();

  if (searchQ) {
    const q = searchQ.toLowerCase();
    data = data.filter(r =>
      g(r, COL.artist).toLowerCase().includes(q) ||
      g(r, COL.title).toLowerCase().includes(q) ||
      g(r, COL.label).toLowerCase().includes(q) ||
      g(r, COL.catalog).toLowerCase().includes(q)
    );
  }

  if (view === 'vinilos') {
    if (filterStatus === 'ripped') data = data.filter(r => g(r, COL.ripeado).toLowerCase() === 'si' || g(r, COL.ripeado).toLowerCase() === 'sí');
    if (filterStatus === 'pending') data = data.filter(r => g(r, COL.ripeado).toLowerCase() !== 'si' && g(r, COL.ripeado).toLowerCase() !== 'sí');
    if (filterStatus === 'you') data = data.filter(r => g(r, COL.ripeado_por).toLowerCase().includes('petrik') || g(r, COL.ripeado_por).toLowerCase() === 'tú' || g(r, COL.ripeado_por).toLowerCase() === 'tu');
    if (filterStatus === 'paquillo') data = data.filter(r => g(r, COL.ripeado_por).toLowerCase().includes('paquillo'));
    if (filterDigital === 'verificar') data = data.filter(r => {
      const n = g(r, COL.notes).toLowerCase();
      return n.includes('mp3') || n.includes('wav') || n.includes('flac') || g(r, COL.digital_estado).toLowerCase() === 'verificar';
    });
    if (filterDigital === 'confirmado') data = data.filter(r => g(r, COL.digital_estado).toLowerCase() === 'confirmado');
    if (filterDigital === 'no') data = data.filter(r => g(r, COL.digital_estado).toLowerCase() === 'no');
  }

  if (filterGenre) data = data.filter(r => g(r, COL.genre).toLowerCase().includes(filterGenre.toLowerCase()));

  data.sort((a, b) => {
    let va = g(a, COL[sortCol] ?? COL.artist);
    let vb = g(b, COL[sortCol] ?? COL.artist);
    return va.localeCompare(vb) * sortDir;
  });

  return data;
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const vinyls = getVinyls();
  const digital = getDigital();
  const ripped = vinyls.filter(r => g(r, COL.ripeado).toLowerCase() === 'si' || g(r, COL.ripeado).toLowerCase() === 'sí').length;
  const pct = vinyls.length ? Math.round(ripped / vinyls.length * 100) : 0;
  document.getElementById('stat-vinilos').textContent = vinyls.length.toLocaleString();
  document.getElementById('stat-ripeados').textContent = ripped.toLocaleString();
  document.getElementById('stat-digital').textContent = digital.length.toLocaleString();
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + '% ripeado';
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function loadCoverForRow(row) {
  const releaseId = g(row, COL.release_id);
  if (!releaseId) return null;
  // Quitar último dígito del release_id (formato del Sheet tiene un 0 extra)
  const cleanId = releaseId.toString().slice(0, -1);
  if (coverCache[cleanId] !== undefined) return coverCache[cleanId];
  try {
    const res = await fetch(`https://api.discogs.com/releases/${cleanId}`, { headers: DISCOGS_HEADERS });
    const data = await res.json();
    const images = data.images || [];
    const primary = images.find(i => i.type === 'primary');
    const img = (primary && primary.uri) || (images[0] && images[0].uri) || null;
    coverCache[cleanId] = img;
    return img;
  } catch(e) { coverCache[cleanId] = null; return null; }
}

async function autoLoadCover(row) {
  const img = await loadCoverForRow(row);
  if (img) {
    const el = document.getElementById('detail-cover-img');
    if (el) { el.src = img; el.style.display = 'block'; }
    const ph = document.getElementById('cover-ph');
    if (ph) ph.style.display = 'none';
  }
}

function selectRow(idx) {
  selectedRow = allData[idx];
  renderView();
  // Cargar carátula automáticamente si es vinilo con release_id
  const row = allData[idx];
  if (g(row, COL.release_id)) {
    autoLoadCover(row);
  }
}

function toggleSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  renderView();
}

async function reloadData() {
  showToast('Recargando...');
  await loadData();
  renderStats();
  renderView();
}

function toggleRipped(idx) {
  const row = allData[idx];
  const isRipped = g(row, COL.ripeado).toLowerCase() === 'si' || g(row, COL.ripeado).toLowerCase() === 'sí';
  row[COL.ripeado] = isRipped ? 'No' : 'Sí';
  if (!isRipped && !row[COL.ripeado_por]) row[COL.ripeado_por] = 'DJ Petrik';
  selectedRow = row;
  renderStats();
  renderView();
  showToast(isRipped ? 'Marcado como pendiente' : '✓ Marcado como ripeado');
  saveToSheet(idx);
}

function setRipper(idx, who) {
  allData[idx][COL.ripeado_por] = who;
  selectedRow = allData[idx];
  renderView();
  saveToSheet(idx);
}

function setDigitalEstado(idx, estado) {
  allData[idx][COL.digital_estado] = estado;
  selectedRow = allData[idx];
  renderView();
  saveToSheet(idx);
  showToast('Estado digital actualizado');
}

async function saveToSheet(idx) {
  // Para escribir en Google Sheets desde el navegador se necesita OAuth.
  // Por ahora guardamos en localStorage como caché local y mostramos instrucción.
  const key = 'vinylbase_changes';
  const changes = JSON.parse(localStorage.getItem(key) || '{}');
  changes[idx] = allData[idx];
  localStorage.setItem(key, JSON.stringify(changes));
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal() {
  newRec = { artist:'', title:'', year:'', label:'', catalog:'', genre:'House', notes:'' };
  document.getElementById('modal-add').style.display = 'flex';
  document.getElementById('f-artist').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-year').value = '';
  document.getElementById('f-label').value = '';
  document.getElementById('f-catalog').value = '';
  document.getElementById('discogs-results').style.display = 'none';
}

function closeModal() {
  document.getElementById('modal-add').style.display = 'none';
}

function updateNewRec(field, val) { newRec[field] = val; }

function addRecord() {
  if (!newRec.artist || !newRec.title) { showToast('⚠ Artista y título son obligatorios', true); return; }
  const row = new Array(25).fill('');
  row[COL.catalog] = newRec.catalog;
  row[COL.artist] = newRec.artist;
  row[COL.title] = newRec.title;
  row[COL.label] = newRec.label;
  row[COL.year] = newRec.year;
  row[COL.genre] = newRec.genre;
  row[COL.format] = '12"';
  row[COL.fuente] = 'Manual';
  row[COL.notes] = newRec.notes;
  row[COL.date_added] = new Date().toLocaleDateString('es-ES');
  row[COL.ripeado] = 'No';
  allData.unshift(row);
  closeModal();
  renderStats();
  renderView();
  showToast('✓ Disco añadido — recuerda guardar en el Sheet');
}

// ─── DISCOGS ──────────────────────────────────────────────────────────────────
async function searchDiscogs() {
  const artist = document.getElementById('f-artist').value;
  const title = document.getElementById('f-title').value;
  const q = (artist + ' ' + title).trim();
  if (q.length < 2) { showToast('⚠ Escribe artista o título primero', true); return; }

  document.getElementById('discogs-btn-label').textContent = 'Buscando...';
  try {
    const res = await fetch(`https://api.discogs.com/database/search?q=${encodeURIComponent(q)}&type=release&per_page=6&format=Vinyl`, {
      headers: DISCOGS_HEADERS
    });
    const data = await res.json();
    const results = (data.results || []).slice(0, 6);
    const box = document.getElementById('discogs-results');
    if (results.length === 0) { box.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text3)">Sin resultados en Discogs</div>'; }
    else {
      box.innerHTML = `<div class="discogs-box">${results.map((r,i) => `
        <div class="discogs-item" onclick="selectDiscogs(${i},'${escJ(r.title)}','${escJ(r.year||'')}','${escJ((r.label&&r.label[0])||'')}','${escJ(r.catno||'')}','${escJ(r.thumb||'')}')">
          <div class="discogs-thumb">${r.thumb ? `<img src="${r.thumb}" loading="lazy" style="width:100%;height:100%;object-fit:cover">` : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg>'}</div>
          <div class="discogs-info">
            <div class="discogs-title">${r.title}</div>
            <div class="discogs-meta">${r.year||''}${r.label&&r.label[0]?' · '+r.label[0]:''}</div>
          </div>
        </div>`).join('')}</div>`;
    }
    box.style.display = 'block';
  } catch(e) {
    showToast('⚠ Error conectando con Discogs', true);
  }
  document.getElementById('discogs-btn-label').textContent = 'Buscar en Discogs';
}

function escJ(s) { return (s||'').replace(/'/g,"\\'").replace(/\n/g,' '); }

function selectDiscogs(i, title, year, label, catno, thumb) {
  const parts = title.split(' - ');
  if (parts.length >= 2) {
    document.getElementById('f-artist').value = parts[0]; newRec.artist = parts[0];
    document.getElementById('f-title').value = parts.slice(1).join(' - '); newRec.title = parts.slice(1).join(' - ');
  } else {
    document.getElementById('f-title').value = title; newRec.title = title;
  }
  if (year) { document.getElementById('f-year').value = year; newRec.year = year; }
  if (label) { document.getElementById('f-label').value = label; newRec.label = label; }
  if (catno) { document.getElementById('f-catalog').value = catno; newRec.catalog = catno; }
  document.getElementById('discogs-results').style.display = 'none';
}

async function searchCoverDiscogs(idx) {
  const row = allData[idx];
  const releaseId = g(row, COL.release_id);
  if (!releaseId) { showToast('Sin Release ID de Discogs', true); return; }
  showToast('Buscando carátula en Discogs...');
  try {
    const res = await fetch(`https://api.discogs.com/releases/${releaseId}`, {
      headers: { 'User-Agent': 'VinylBase/1.0' }
    });
    const data = await res.json();
    const img = data.images && data.images[0] && data.images[0].uri;
    if (img) {
      const ph = document.getElementById('cover-ph');
      if (ph) ph.outerHTML = `<img src="${img}" style="width:100%;height:100%;object-fit:cover">`;
      showToast('✓ Carátula cargada');
    } else showToast('Sin carátula en Discogs para este release', true);
  } catch(e) { showToast('Error al buscar carátula', true); }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function showToast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'flex';
  el.style.borderColor = isErr ? 'var(--red)' : 'var(--border2)';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2500);
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => showToast('✓ Enlace copiado'));
}


// ─── KALLAX ───────────────────────────────────────────────────────────────────
// true = hueco con vinilos, false = vacío/no usado
const KALLAX_2x4 = [
  [null, null, 2,  1], // fila 1: huecos 1 y 2 (derecha a izquierda)
  [null, 5,    4,  3], // fila 2: huecos 3, 4, 5
];
const KALLAX_4x4 = [
  [9,    8,    7,  6 ], // fila 1: huecos 6-9
  [null, 12,   11, 10], // fila 2: huecos 10-12
  [null, 15,   14, 13], // fila 3: huecos 13-15
  [null, null, null, null], // fila 4: no se usa
];

function renderKallax(selectedSlot, onSelect) {
  // Construir mapa de huecos ocupados
  const occupied = {};
  allData.forEach(r => {
    const slot = g(r, COL.kallax_slot);
    if (slot) occupied[slot] = true;
  });

  function grid(matrix, label) {
    const cols = matrix[0].length;
    return `<div class="kallax-unit">
      <div class="kallax-label">${label}</div>
      <div class="kallax-grid" style="grid-template-columns:repeat(${cols},1fr)">
        ${matrix.map(row => row.map(slot => {
          if (slot === null) return `<div class="kc empty"></div>`;
          const isSel = String(selectedSlot) === String(slot);
          const isOcc = occupied[slot] && !isSel;
          return `<div class="kc ${isSel ? 'on' : isOcc ? 'occupied' : ''}" onclick="${onSelect}(${slot})" title="Hueco ${slot}">${slot}</div>`;
        }).join('')).join('')}
      </div>
    </div>`;
  }

  return `<div class="kallax-section">
    ${grid(KALLAX_2x4, 'Kallax 2×4 (arriba)')}
    ${grid(KALLAX_4x4, 'Kallax 4×4 (abajo)')}
  </div>`;
}

function setKallaxSlot(idx, slot) {
  allData[idx][COL.kallax_slot] = String(slot);
  selectedRow = allData[idx];
  renderView();
  showToast('\u2713 Ubicado en hueco ' + slot);
  saveToSheet(idx);
}
